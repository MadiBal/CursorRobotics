<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Servolt — AI physical rehab coach</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    .shell-head {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid #16211c;
    }
    .brand { display: flex; align-items: baseline; gap: 0.6rem; }
    .brand h1 { margin: 0; font-size: 1.35rem; letter-spacing: 0.02em; }
    .brand h1 .dot { color: var(--safe); }
    .brand .tag { color: #7fa392; font-size: 0.8rem; }

    .mode-tabs { display: flex; gap: 0.4rem; margin-left: auto; }
    .mode-tabs button {
      background: #101814;
      color: #9db8ab;
      border: 1px solid #1d2b24;
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
    }
    .mode-tabs button.active {
      background: var(--safe);
      color: #04120c;
      border-color: var(--safe);
      font-weight: 700;
    }
    .shell-head .fs-btn { margin-left: 0.75rem; }

    .app-frame { flex: 1; border: 0; width: 100%; background: var(--bg); }
  </style>
</head>
<body>
  <div class="shell-head">
    <div class="brand">
      <h1>Servolt<span class="dot">.</span></h1>
      <span class="tag">AI rehab coach — squat form &amp; wrist-fracture recovery</span>
    </div>
    <nav class="mode-tabs">
      <button id="tabWrist" class="active">Wrist Rehab</button>
      <button id="tabSquat">Squat Coach</button>
    </nav>
    <button id="fullscreenBtn" class="fs-btn" title="Fullscreen demo mode">⛶ Fullscreen</button>
  </div>

  <iframe id="appFrame" class="app-frame" src="/wrist.html?embed=1"
          allow="camera; microphone; fullscreen"></iframe>

  <script>
    const frame = document.getElementById("appFrame");
    const tabs = { wrist: document.getElementById("tabWrist"), squat: document.getElementById("tabSquat") };
    function activate(mode) {
      frame.src = mode === "wrist" ? "/wrist.html?embed=1" : "/squat.html?embed=1";
      tabs.wrist.classList.toggle("active", mode === "wrist");
      tabs.squat.classList.toggle("active", mode === "squat");
    }
    tabs.wrist.onclick = () => activate("wrist");
    tabs.squat.onclick = () => activate("squat");

    document.getElementById("fullscreenBtn").onclick = () =>
      document.fullscreenElement
        ? document.exitFullscreen()
        : document.documentElement.requestFullscreen();
  </script>
</body>
</html>
